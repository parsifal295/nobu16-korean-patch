name: README translation progress

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify-progress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify generated README progress
        run: python -B tools/update_readme_progress.py --check
      - name: Run progress regression test
        run: python -B -m unittest tests.test_readme_progress
